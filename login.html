<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Bharat Insight</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { background: '#0b0b0f', foreground: '#e2e8f0' } } }
        }
    </script>
    <!-- Custom logic and styles -->
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="min-h-screen bg-[#050505] flex flex-col items-center justify-center px-4 relative overflow-hidden">
    
    <!-- Background glows -->
    <div class="absolute inset-0 -z-10 bg-[#07070d]">
        <div class="absolute w-[600px] h-[600px] rounded-full bg-violet-600/[0.04] blur-[130px] -top-40 -left-40"></div>
        <div class="absolute w-[500px] h-[500px] rounded-full bg-indigo-600/[0.04] blur-[120px] bottom-0 -right-40"></div>
        <div class="absolute inset-0 opacity-[0.02]" style="background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 48px 48px;"></div>
    </div>

    <!-- Back link -->
    <a href="index.html" class="absolute top-6 left-6 flex items-center gap-2 text-white/30 hover:text-white/60 transition-colors text-sm">
        <i data-feather="arrow-left" class="w-4 h-4"></i>
        Back to Home
    </a>

    <!-- Card -->
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-violet-600/20 border border-indigo-500/30 flex items-center justify-center mb-5 shadow-[0_0_20px_rgba(99,102,241,0.3)] text-indigo-400">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
                    <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Welcome back</h1>
            <p class="text-white/40 text-sm mt-1">Sign in to your Bharat-Insight workspace</p>
        </div>

        <div class="glass-panel-heavy glow-border rounded-[24px] p-8">
            <form id="login-form" class="space-y-5">
                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-white/45 uppercase tracking-wider">Email</label>
                    <input type="email" placeholder="you@ministry.gov.in" class="w-full bg-[#1e1e2e]/30 border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all shadow-inner" required />
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-white/45 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <input id="pw-input" type="password" placeholder="••••••••" class="w-full bg-[#1e1e2e]/30 border border-white/[0.08] rounded-xl px-4 py-3 pr-11 text-sm text-white placeholder:text-white/20 focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all shadow-inner" required />
                        <button type="button" id="pw-toggle" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-white/25 hover:text-white/50 transition-colors">
                            <i data-feather="eye" class="w-4 h-4" id="pw-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Simulated Status Message -->
                <div id="status-msg" class="hidden text-xs rounded-xl px-4 py-3 leading-relaxed"></div>

                <!-- Sign In -->
                <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white text-sm flex items-center justify-center gap-2 transition-all hover:scale-[1.02] shadow-[0_4px_12px_rgba(99,102,241,0.2)]" style="background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%)">
                    Sign In
                </button>

                <div class="flex items-center gap-3">
                    <div class="flex-1 h-px bg-white/[0.06]"></div>
                    <span class="text-white/20 text-xs">or</span>
                    <div class="flex-1 h-px bg-white/[0.06]"></div>
                </div>

                <!-- SSO access -->
                <button type="button" onclick="window.location.href='dashboard.html'" class="w-full py-3 rounded-xl font-semibold text-white/80 text-sm flex items-center justify-center gap-2 bg-white/[0.04] border border-white/[0.06] hover:bg-white/[0.08] hover:text-white transition-all">
                    <i data-feather="shield" class="w-3.5 h-3.5"></i>
                    Continue with SSO
                </button>
            </form>

            <p class="text-center text-xs text-white/25 mt-6">
                No account yet? <a href="signup.html" class="text-indigo-400 hover:text-indigo-300 transition-colors font-medium">Create one free</a>
            </p>
        </div>

        <p class="text-center text-[11px] text-white/30 mt-6 flex items-center justify-center gap-1.5">
            <i data-feather="lock" class="w-3 h-3"></i> Secured with 256-bit encryption
        </p>
    </div>

    <script src="./assets/js/login.js"></script>
</body>
</html>
